services:
  - type: web
    name: splitwise-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn splitwise_backend.wsgi --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 10000
      - key: DJANGO_SETTINGS_MODULE
        value: splitwise_backend.settings
